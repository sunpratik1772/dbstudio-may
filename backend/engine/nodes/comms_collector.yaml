type_id: COMMS_COLLECTOR
description: "Query Oculus comms with keyword scanning"

ui:
  color: "#059669"
  icon: MessageSquareText
  config_tags: [output_name]

input_ports:
  - name: context
    type: object
    description: "Context keys referenced in query_template as {context.xxx}."
    optional: true

output_ports:
  - name: comms
    type: dataframe
    description: >-
      DataFrame with columns: user, timestamp, display_post, event_type,
      _keyword_hit, _matched_keywords. Stored under ctx.datasets[output_name].
  - name: keyword_hit_count
    type: scalar
    description: "Total keyword hit count (int). Stored as {output_name}_keyword_hits."
    optional: true

params:
  - name: query_template
    type: string
    description: "Oculus query with {context.xxx} placeholders."
    required: true
    widget: textarea
  - name: keywords
    type: string_list
    description: "Terms to scan in display_post."
    default: []
    required: false
  - name: output_name
    type: string
    description: "Dataset name in ctx.datasets."
    default: comms
    required: true
  - name: mock_csv_path
    type: string
    description: >-
      Demo-mode override: path to a CSV used verbatim instead of the synthetic
      generator. Ignored if the file is missing.
    default: ""
    required: false

semantics:
  requires: [trader, time]

constraints:
  - "Always adds _keyword_hit (boolean) and _matched_keywords (list[str]) columns."
  - "Scans display_post field only."
