type_id: DATA_HIGHLIGHTER
description: "Apply colour rules to dataset rows"

ui:
  color: "#9333EA"
  icon: Highlighter
  config_tags: [output_name]

input_ports:
  - name: dataset
    type: dataframe
    description: "Any DataFrame referenced by input_name."

output_ports:
  - name: highlighted
    type: dataframe
    store_at: "ctx.datasets[{output_name}]"
    description: >-
      Input DataFrame + _highlight_colour (hex) + _highlight_label (str).
      Stored under ctx.datasets[output_name].
    required_columns:
      - _highlight_colour
      - _highlight_label

params:
  - name: input_name
    type: input_ref
    description: "Source dataset."
    required: true
  - name: output_name
    type: string
    description: "Highlighted dataset name (convention: input_name + '_highlighted')."
    required: true
  - name: rules
    type: array
    description: >-
      Array of {condition: string (pandas eval expression),
      colour: string (hex #RRGGBB), label: string}.
    default: []
    required: false

semantics:
  requires: []

constraints:
  - "Conditions are evaluated with pandas DataFrame.eval()."
  - "Rules are applied in order — last matching rule wins."
  - "Rows with no matching rule get colour #FFFFFF and empty label."
