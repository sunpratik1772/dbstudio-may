type_id: TRADE_DATA_COLLECTOR
description: "Query Solr trade data (orders/executions)"

ui:
  color: "#2563EB"
  icon: ArrowLeftRight
  config_tags: [source, output_name]

input_ports:
  - name: context
    type: object
    description: "Context keys referenced in query_template as {context.xxx}"
    optional: true

output_ports:
  - name: trades
    type: dataframe
    description: "Order / execution rows. Stored in ctx.datasets under the configured output_name."
  - name: row_count
    type: scalar
    description: "Integer row count. Stored in ctx.values as {output_name}_count."
    optional: true

params:
  - name: source
    type: enum
    description: "Which Solr collection to query."
    enum: [hs_client_order, hs_execution]
    default: hs_client_order
    required: true
  - name: query_template
    type: string
    description: "Solr query; use {context.xxx} placeholders for alert fields."
    required: true
    widget: textarea
  - name: output_name
    type: string
    description: "Dataset name in ctx.datasets."
    default: trade_data
    required: true
  - name: loop_over_books
    type: boolean
    description: "Repeat the query for each book in the books list."
    default: false
    required: false
  - name: books
    type: string_list
    description: "Book names when loop_over_books=true."
    default: []
    required: false
  - name: mock_csv_path
    type: string
    description: >-
      Demo-mode override: path to a CSV used verbatim instead of the synthetic
      generator. Ignored if the file is missing.
    default: ""
    required: false

semantics:
  requires: [trader, time]

constraints:
  - "When source='hs_execution', trade_version:1 MUST be hard-coded in query_template — never from context."
  - "Output DataFrame will always include trade_version=1 column for hs_execution."
